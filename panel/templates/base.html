<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Herr Herbert Zufallsklasse{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
{% block head_extra %}{% endblock %}
</head>
<body>
<nav class="container topnav">
  <ul>
    <li>
      <a href="{{ url_for('index') }}" class="brand">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="" class="brand-logo" width="32" height="32">
        <strong>Herr Herbert</strong>
      </a>
    </li>
  </ul>
  <ul>
    <li><a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Steuerung</a></li>
    <li><a href="{{ url_for('stats_page') }}" class="{% if request.endpoint == 'stats_page' %}active{% endif %}">Stats</a></li>
    <li><a href="{{ url_for('rate_home') }}" class="{% if request.endpoint and request.endpoint.startswith('rate') %}active{% endif %}">Rate</a></li>
    {% if current_user %}
    <li class="user-chip">
      <span class="user-name">{{ current_user.global_name }}</span>
      <a href="{{ url_for('auth_logout') }}" class="logout" title="Logout">&times;</a>
    </li>
    {% endif %}
  </ul>
</nav>
<main class="container">
  {% block content %}{% endblock %}
</main>
<footer class="container site-footer">{% block footer %}Herr Herbert Zufallsklasse{% endblock %}</footer>
{% block scripts %}{% endblock %}
</body>
</html>
