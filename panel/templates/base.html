<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Herr Herbert Zufallsklasse{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block head_extra %}{% endblock %}
</head>
<body>
<nav class="container topnav">
  <ul>
    <li><strong>Herr Herbert</strong></li>
  </ul>
  <ul>
    <li><a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Steuerung</a></li>
    <li><a href="{{ url_for('stats_page') }}" class="{% if request.endpoint == 'stats_page' %}active{% endif %}">Stats</a></li>
  </ul>
</nav>
<main class="container">
  {% block content %}{% endblock %}
</main>
<footer class="container site-footer">{% block footer %}Herr Herbert Zufallsklasse{% endblock %}</footer>
{% block scripts %}{% endblock %}
</body>
</html>
